spring.application.name=taskmanager

# Cloud MySQL Database Connection (Alag-alag format mein)
# 🔒 SECURE DATABASE CONFIGURATION
# It will use Railway variables if available, otherwise it will use localhost defaults
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/taskmanager}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true