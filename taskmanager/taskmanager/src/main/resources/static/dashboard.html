<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethara Task Manager - Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-body">
    <div class="header">
        <h2>Task Dashboard</h2>
        <div>
            <span id="userRoleBadge" style="margin-right: 15px; font-weight: 600; color: var(--text-muted);">Loading Role...</span>
            <button class="btn-danger" onclick="logoutUser()">Logout</button>
        </div>
    </div>

    <div class="grid">
        <!-- ADMIN SECTION -->
        <div class="card hidden" id="adminSection">
            <h3>Admin Controls</h3>
            
            <hr style="margin: 15px 0;">
            <h4>Create New Project</h4>
            <form id="projectForm">
                <input type="text" id="proj-name" placeholder="Enter Project Name" required>
                <button type="submit" class="btn-primary">Add Project</button>
            </form>

            <hr style="margin: 25px 0 15px 0;">
            <h4>Assign New Task</h4>
            <form id="taskForm">
                <input type="text" id="task-title" placeholder="Task Title" required>
                <input type="text" id="task-desc" placeholder="Task Description" required>
                <input type="date" id="task-due" required>
                
                <!-- DROPDOWNS FOR PROJECTS AND USERS -->
                <select id="task-project-id" required>
                    <option value="">Loading Projects...</option>
                </select>
                
                <select id="task-assignee-id" required>
                    <option value="">Loading Users...</option>
                </select>
                
                <button type="submit" class="btn-primary">Assign Task</button>
            </form>
        </div>

        <!-- TASKS LIST -->
        <div class="card" id="taskContainer" style="grid-column: span 2;">
            <h3>Your Assigned Tasks</h3>
            <div id="tasksList">Fetching your tasks...</div>
        </div>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
