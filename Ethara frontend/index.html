<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ethara AI - Login</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f4f9; }
        .login-box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>Ethara AI Portal</h2>
        
        <!-- The form triggers the login function in our javascript -->
        <form onsubmit="login(event)">
            <input type="text" id="username" placeholder="Username (Email)" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Log In</button>
        </form>
        
        <p id="error-message" style="color: red; display: none;">Login failed. Check credentials.</p>
    </div>

    <!-- Connect our JavaScript file -->
    <script src="app.js"></script>
</body>
</html>
